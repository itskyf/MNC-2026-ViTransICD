exclude = { glob = [".agents/skills/**"] }

# Python
[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.3"
hooks = [{ id = "uv-lock" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.9"
hooks = [
  { id = "ruff-check" },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/srstevenson/nb-clean"
rev = "4.0.1"
hooks = [{ id = "nb-clean", args = ["--preserve-cell-outputs"] }]

# Shell
[[repos]]
repo = "https://github.com/koalaman/shellcheck-precommit"
rev = "v0.11.0"
hooks = [{ id = "shellcheck" }]

[[repos]]
repo = "https://github.com/scop/pre-commit-shfmt"
rev = "v3.13.0-1"
hooks = [{ id = "shfmt" }]

# SQL
[[repos]]
repo = "https://github.com/concur1/sqruff-pre-commit"
rev = "v0.37.3"
hooks = [
  { id = "sqruff-fix" },
  { id = "sqruff-lint" },
]

# Docker
[[repos]]
repo = "https://github.com/reteps/dockerfmt"
rev = "v0.5.2"
hooks = [{ id = "dockerfmt" }]

# Web, configuration
[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "v2.4.10"
hooks = [{ id = "biome-check" }]

[[repos]]
repo = "https://github.com/tombi-toml/tombi-pre-commit"
rev = "v0.9.15"
hooks = [
  { id = "tombi-format" },
  { id = "tombi-lint" },
]

# Docs
[[repos]]
repo = "https://github.com/rvben/rumdl-pre-commit"
rev = "v0.1.67"
hooks = [
  { id = "rumdl-fmt" },
  { id = "rumdl" },
]

[[repos]]
repo = "https://github.com/typstyle-rs/pre-commit-typstyle"
rev = "v0.14.4"
hooks = [{ id = "typstyle" }]
